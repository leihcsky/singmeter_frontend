<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default Title (updated per route by each page's useEffect) -->
    <title>SingMeter - Free Online Singing Tools | Vocal Range Test &amp; Pitch Detector</title>

    <!-- Static Meta Tags (never change) -->
    <meta name="author" content="SingMeter" />
    <meta name="robots" content="index, follow" />

    <!-- Per-URL canonical in initial HTML (SPA); React updates title/description after load -->
    <script>
      (function () {
        var origin = 'https://www.singmeter.com';
        var path = location.pathname.replace(/\/+$/, '') || '/';
        var href = origin + (path === '/' ? '' : path);
        var link = document.querySelector('link[rel="canonical"]');
        if (!link) {
          link = document.createElement('link');
          link.rel = 'canonical';
          document.head.appendChild(link);
        }
        link.href = href;
      })();
    </script>

    <!-- Note: title, description, og:* are set by bootstrapSeo + page components after load. -->

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SingMeter",
      "url": "https://www.singmeter.com",
      "description": "Free online singing tools including vocal range test, pitch detector, tone generator, metronome, and educational resources for vocalists.",
      "publisher": {
        "@type": "Organization",
        "name": "SingMeter",
        "url": "https://www.singmeter.com"
      }
    }
    </script>

    <!-- Google Fonts — fetched with media="print" so they don't block first paint;
         JS upgrades them to media="all" after load (gated to skip prerender). -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap">
    <link id="sm-fonts" rel="stylesheet" media="print" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap"></noscript>

    <!-- Analytics & ads: queue config immediately, but load the heavy SDKs after first
         paint (idle) so they don't compete with the critical render path on mobile.
         All runtime mutation is skipped during prerender to keep the static HTML clean. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LPZ98PGRSL');

      (function () {
        if (window.__PRERENDER__) return; // keep prerendered snapshot pristine

        // Apply web fonts without blocking the critical render path.
        function enableFonts() {
          var f = document.getElementById('sm-fonts');
          if (f) f.media = 'all';
        }
        if (document.readyState !== 'loading') enableFonts();
        else document.addEventListener('DOMContentLoaded', enableFonts);

        var loaded = false;
        function loadThirdParty() {
          if (loaded) return;
          loaded = true;

          var ga = document.createElement('script');
          ga.async = true;
          ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-LPZ98PGRSL';
          document.head.appendChild(ga);

          var ads = document.createElement('script');
          ads.async = true;
          ads.crossOrigin = 'anonymous';
          ads.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3293976111230987';
          document.head.appendChild(ads);

          (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
          })(window, document, "clarity", "script", "ue3io4skuo");
        }

        function schedule() {
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadThirdParty, { timeout: 3000 });
          } else {
            setTimeout(loadThirdParty, 1500);
          }
        }

        if (document.readyState === 'complete') {
          schedule();
        } else {
          window.addEventListener('load', schedule);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
