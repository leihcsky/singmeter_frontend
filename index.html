<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default Title (updated per route by each page's useEffect) -->
    <title>SingMeter - Free Online Singing Tools | Vocal Range Test &amp; Pitch Detector</title>

    <!-- Static Meta Tags (never change) -->
    <meta name="author" content="SingMeter" />
    <meta name="robots" content="index, follow" />

    <!-- Per-URL canonical in initial HTML (SPA); React updates title/description after load -->
    <script>
      (function () {
        var origin = 'https://www.singmeter.com';
        var path = location.pathname.replace(/\/+$/, '') || '/';
        var href = origin + (path === '/' ? '' : path);
        var link = document.querySelector('link[rel="canonical"]');
        if (!link) {
          link = document.createElement('link');
          link.rel = 'canonical';
          document.head.appendChild(link);
        }
        link.href = href;
      })();
    </script>

    <!-- Note: title, description, og:* are set by bootstrapSeo + page components after load. -->

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SingMeter",
      "url": "https://www.singmeter.com",
      "description": "Free online singing tools including vocal range test, pitch detector, tone generator, metronome, and educational resources for vocalists.",
      "publisher": {
        "@type": "Organization",
        "name": "SingMeter",
        "url": "https://www.singmeter.com"
      }
    }
    </script>

    <!-- Self-hosted fonts (latin subset, woff2). Preload the above-the-fold faces
         (body Inter + hero h1 Poppins 800) so the LCP text paints in its final
         font early instead of repainting on a late web-font swap. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin.woff2" crossorigin>
    <link rel="preload" as="font" type="font/woff2" href="/fonts/poppins-800-latin.woff2" crossorigin>
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/inter-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Poppins';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('/fonts/poppins-600-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Poppins';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/poppins-700-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Poppins';
        font-style: normal;
        font-weight: 800;
        font-display: swap;
        src: url('/fonts/poppins-800-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>

    <!-- Analytics & ads: queue config immediately, but load the heavy SDKs after first
         paint (idle) so they don't compete with the critical render path on mobile.
         All runtime mutation is skipped during prerender to keep the static HTML clean. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LPZ98PGRSL');

      (function () {
        if (window.__PRERENDER__) return; // keep prerendered snapshot pristine

        var loaded = false;
        function loadThirdParty() {
          if (loaded) return;
          loaded = true;

          var ga = document.createElement('script');
          ga.async = true;
          ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-LPZ98PGRSL';
          document.head.appendChild(ga);

          var ads = document.createElement('script');
          ads.async = true;
          ads.crossOrigin = 'anonymous';
          ads.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3293976111230987';
          document.head.appendChild(ads);

          (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
          })(window, document, "clarity", "script", "ue3io4skuo");
        }

        function schedule() {
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadThirdParty, { timeout: 3000 });
          } else {
            setTimeout(loadThirdParty, 1500);
          }
        }

        if (document.readyState === 'complete') {
          schedule();
        } else {
          window.addEventListener('load', schedule);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
